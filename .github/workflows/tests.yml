name: total tests
on: push
jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: install pytest and pytest-cov
        run: pip install pytest pytest-cov flake8
      - name: runtest to find coverage
        run: pytest --cov
      - name: Set up Python
        uses: actions/setup-python@v5
        with: 
          python-version: "3.11"
